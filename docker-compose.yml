services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  chat:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - chroma_data:/app/.chroma
    command: ["streamlit", "run", "apps/chat.py", "--server.address=0.0.0.0", "--server.port=8501"]

  dashboard:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
      - chroma_data:/app/.chroma
    command: ["streamlit", "run", "apps/dashboard.py", "--server.address=0.0.0.0", "--server.port=8502"]

volumes:
  redis_data:
  chroma_data:
